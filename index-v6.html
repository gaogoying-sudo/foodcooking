<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>菜谱关系分析系统 v6 - SOP 时间轴</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#667eea;--secondary:#764ba2;--success:#28a745;--warning:#ffc107;--danger:#dc3545;--info:#17a2b8;--dark:#1a1a2e;--light:#f8f9fa}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
    .container{max-width:1800px;margin:0 auto}
    .header{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
    h1{color:var(--dark);font-size:28px;margin-bottom:8px}
    .subtitle{color:#666;font-size:14px}
    .version-badge{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;margin-left:12px}
    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;background:#fff;padding:16px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
    .tab{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;background:#f0f0f0;color:#666;transition:all 0.2s}
    .tab:hover{background:#e0e0e0}
    .tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
    .tab-content{display:none;background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
    .tab-content.active{display:block}
    
    /* V6 特有样式 */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
    .stat{background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:12px;padding:20px;color:#fff}
    .stat-value{font-size:32px;font-weight:700;margin-bottom:8px}
    .stat-label{font-size:14px;opacity:0.9}
    
    .recipe-list{height:600px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px;background:#fff}
    .recipe-item{padding:16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:all 0.2s}
    .recipe-item:hover{background:#f8f9fa}
    .recipe-item.active{background:linear-gradient(90deg,rgba(102,126,234,0.1),transparent);border-left:3px solid var(--primary)}
    
    .sop-container{margin-top:20px}
    .power-chart{height:300px;background:#f8f9fa;border-radius:8px;padding:20px;position:relative}
    .power-svg{width:100%;height:100%}
    .power-line{fill:none;stroke:var(--primary);stroke-width:3}
    .power-point{fill:var(--primary);stroke:#fff;stroke-width:2}
    
    .timeline{margin-top:20px}
    .timeline-item{display:flex;gap:16px;margin-bottom:16px;padding:16px;background:#f8f9fa;border-radius:8px;border-left:4px solid var(--primary)}
    .timeline-time{min-width:80px;font-weight:600;color:var(--primary)}
    .timeline-content{flex:1}
    .timeline-text{font-size:14px;color:#666}
    .timeline-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;margin-left:8px}
    .tag-manual{background:rgba(255,193,7,0.2);color:var(--warning)}
    .tag-auto{background:rgba(40,167,69,0.2);color:var(--success)}
    
    .loading{text-align:center;padding:60px 20px;color:#666}
    .loading-spinner{border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    
    .search-box{display:flex;gap:12px;margin-bottom:20px}
    .search-input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px}
    .search-input:focus{outline:none;border-color:var(--primary)}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍳 菜谱关系分析系统 <span class="version-badge">V6 SOP 时间轴</span></h1>
      <p class="subtitle">需求端 ↔ 交付端 ↔ 控制变量 映射体系</p>
    </div>
    
    <div class="tabs">
      <button class="tab" onclick="location.href='index.html'">V1 极速</button>
      <button class="tab" onclick="location.href='index-dimensions.html'">V2 维度</button>
      <button class="tab" onclick="location.href='index-v3.html'">V3 完整</button>
      <button class="tab" onclick="location.href='index-v4.html'">V4 集成</button>
      <button class="tab" onclick="location.href='index-v5.html'">V5 滚动</button>
      <button class="tab active">V6 分析</button>
    </div>
    
    <!-- Tab 1: 菜谱列表 -->
    <div id="recipes" class="tab-content active">
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">总菜谱数</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="avgTime">0s</div>
          <div class="stat-label">平均时长</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="avgPower">0W</div>
          <div class="stat-label">平均功率</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="avgAutomation">0%</div>
          <div class="stat-label">平均自动化</div>
        </div>
      </div>
      
      <div class="search-box">
        <input type="text" class="search-input" id="recipeSearch" placeholder="搜索菜谱名称、ID..." onkeyup="filterRecipes()">
      </div>
      
      <div class="recipe-list" id="recipeList">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>正在加载 13,510 条菜谱数据...</div>
          <div style="font-size:12px;color:#999;margin-top:8px">（首次加载需要 10-30 秒）</div>
        </div>
      </div>
    </div>
    
    <!-- Tab 2: SOP 时间轴 -->
    <div id="sop" class="tab-content">
      <h2 style="margin-bottom:20px">📊 SOP 时间轴 - <span id="sopRecipeName">选择菜谱</span></h2>
      
      <div class="power-chart">
        <svg class="power-svg" id="powerChart" viewBox="0 0 800 300" preserveAspectRatio="none">
          <!-- 功率曲线将在这里绘制 -->
        </svg>
      </div>
      
      <div class="timeline" id="timeline">
        <!-- 时间轴事件将在这里显示 -->
      </div>
    </div>
  </div>

  <script>
    // ============ 状态管理 ============
    const state = {
      recipes: [],
      filtered: [],
      selected: null
    };
    
    // ============ 数据加载 ============
    async function loadRecipes(){
      console.log('🚀 V6 开始加载数据...');
      
      try{
        const res = await fetch('data/processed/recipe-profiles.json.gz');
        if(!res.ok) throw new Error('HTTP ' + res.status);
        
        const blob = await res.blob();
        const text = await blob.text();
        const data = JSON.parse(text);
        
        console.log('📊 原始数据:', data.profiles?.length || 0, '条');
        
        state.recipes = (data.profiles || []).map(p => ({
          id: p.meta?.id || 0,
          name: p.meta?.name || '未命名',
          time: p.meta?.cook_time || p.features?.total_time || 0,
          power: p.meta?.max_power || 12000,
          automation: Math.round((1 - (p.features?.manual_count / (p.features?.step_count || 1))) * 100),
          profile: p
        }));
        
        console.log('✅ 加载完成:', state.recipes.length, '条');
        
      }catch(e){
        console.error('❌ 加载失败:', e);
        state.recipes = [];
      }
      
      state.filtered = [...state.recipes];
      updateStats();
      renderRecipeList();
    }
    
    // ============ 渲染函数 ============
    function updateStats(){
      document.getElementById('totalCount').textContent = state.recipes.length.toLocaleString();
      
      const avgTime = state.recipes.reduce((s,r) => s + r.time, 0) / (state.recipes.length || 1);
      document.getElementById('avgTime').textContent = Math.round(avgTime) + 's';
      
      const avgPower = state.recipes.reduce((s,r) => s + r.power, 0) / (state.recipes.length || 1);
      document.getElementById('avgPower').textContent = Math.round(avgPower / 1000) + 'kW';
      
      const avgAuto = state.recipes.reduce((s,r) => s + r.automation, 0) / (state.recipes.length || 1);
      document.getElementById('avgAutomation').textContent = Math.round(avgAuto) + '%';
    }
    
    function renderRecipeList(){
      const container = document.getElementById('recipeList');
      
      if(state.filtered.length === 0){
        container.innerHTML = '<div style="padding:60px;text-align:center;color:#999">没有找到匹配的菜谱</div>';
        return;
      }
      
      // 只渲染前 100 条保证性能
      const display = state.filtered.slice(0, 100);
      const more = state.filtered.length > 100 ? `<div style="padding:12px;text-align:center;color:#999;font-size:12px">... 还有 ${state.filtered.length - 100} 条，请搜索筛选</div>` : '';
      
      container.innerHTML = display.map(r => `
        <div class="recipe-item" onclick="selectRecipe(${r.id})">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;color:var(--dark);margin-bottom:4px">${r.name}</div>
              <div style="font-size:12px;color:#666">
                ⏱️ ${r.time}s · ⚡ ${r.power}W · 🤖 ${r.automation}%
              </div>
            </div>
            <div style="font-size:18px;font-weight:700;color:var(--primary)">ID: ${r.id}</div>
          </div>
        </div>
      `).join('') + more;
    }
    
    function filterRecipes(){
      const val = document.getElementById('recipeSearch').value.toLowerCase();
      state.filtered = state.recipes.filter(r => 
        r.name.toLowerCase().includes(val) || 
        r.id.toString().includes(val)
      );
      renderRecipeList();
    }
    
    function selectRecipe(id){
      state.selected = state.recipes.find(r => r.id === id);
      if(!state.selected) return;
      
      // 更新列表选中状态
      document.querySelectorAll('.recipe-item').forEach((el, i) => {
        el.classList.toggle('active', state.filtered[i]?.id === id);
      });
      
      // 切换到 SOP 标签页
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('sop').classList.add('active');
      document.querySelectorAll('.tab')[5].classList.add('active');
      
      // 渲染 SOP
      renderSOP(state.selected.profile);
    }
    
    function renderSOP(profile){
      document.getElementById('sopRecipeName').textContent = profile.meta?.name || '未命名';
      
      // 绘制功率曲线
      const controls = profile.timeline?.controls || [];
      const svg = document.getElementById('powerChart');
      
      if(controls.length === 0){
        svg.innerHTML = '<text x="400" y="150" text-anchor="middle" fill="#999">暂无功率数据</text>';
      }else{
        // 计算坐标
        const maxTime = Math.max(...controls.map(c => c.t), 1);
        const points = controls.map(c => {
          const x = (c.t / maxTime) * 780 + 20;
          const y = 280 - (c.power / 12000) * 260;
          return `${x},${y}`;
        }).join(' ');
        
        svg.innerHTML = `
          <line x1="20" y1="280" x2="800" y2="280" stroke="#ddd" stroke-width="1"/>
          <line x1="20" y1="20" x2="20" y2="280" stroke="#ddd" stroke-width="1"/>
          <text x="15" y="25" fill="#999" font-size="12">12kW</text>
          <text x="15" y="285" fill="#999" font-size="12">0s</text>
          <text x="780" y="285" fill="#999" font-size="12">${maxTime}s</text>
          <polyline points="${points}" class="power-line"/>
          ${controls.map((c, i) => {
            const x = (c.t / maxTime) * 780 + 20;
            const y = 280 - (c.power / 12000) * 260;
            return `<circle cx="${x}" cy="${y}" r="6" class="power-point"><title>${c.t}s: ${c.power}W - ${c.commands}</title></circle>`;
          }).join('')}
        `;
      }
      
      // 渲染时间轴
      const timeline = document.getElementById('timeline');
      const events = [
        ...(profile.timeline?.controls || []).map(c => ({
          t: c.t,
          text: c.commands,
          type: 'control',
          tag: '功率控制'
        })),
        ...(profile.timeline?.manual_ops || []).map(c => ({
          t: c.t,
          text: c.text,
          type: 'manual',
          tag: '手动'
        })),
        ...(profile.timeline?.auto_dosing || []).map(c => ({
          t: c.t,
          text: c.text,
          type: 'auto',
          tag: '自动'
        }))
      ].sort((a, b) => a.t - b.t);
      
      timeline.innerHTML = events.map(e => `
        <div class="timeline-item">
          <div class="timeline-time">${e.t}s</div>
          <div class="timeline-content">
            <div class="timeline-text">${e.text}</div>
            <span class="timeline-tag ${e.type === 'manual' ? 'tag-manual' : e.type === 'auto' ? 'tag-auto' : ''}">${e.tag}</span>
          </div>
        </div>
      `).join('');
    }
    
    // ============ 初始化 ============
    window.onload = function(){
      loadRecipes();
      console.log('✅ V6 SOP 时间轴已加载');
    };
  </script>
</body>
</html>
