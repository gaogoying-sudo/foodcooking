    function render(){

        const status=warnings.length>0?'status-warning':'status-normal';
        const statusText=warnings.length>0?'⚠️ 警告':'✅ 正常';
        return `<div class="recipe-card ${selected&&selected.id===r.id?'active':''}" onclick="select(${r.id})">

        <div class="timeline-event-card ${type} ${selectedStep===i?'selected':''}"><div class="event-time">${s.time}s</div><div class="event-command">${s.commands}</div><div class="event-detail">${s.power?s.power+'W':''}</div></div></div>`;
      });
      t.innerHTML=html;
    }

      document.getElementById('detailContent').innerHTML=`<div class="detail-grid">
        <div class="detail-item"><div class="detail-label">时间</div><div class="detail-value">${s.time}秒</div></div>
        <div class="detail-item"><div class="detail-label">类型</div><div class="detail-value">${s.type===3?'设备控制':s.type===1?'手动投料':'自动投料'}</div></div>
        <div class="detail-item"><div class="detail-label">执行</div><div class="detail-value">${s.automatic==='1'?'🤖自动':'👤手动'}</div></div>
        <div class="detail-item"><div class="detail-label">功率</div><div class="detail-value">${s.power?s.power+'W':'-'}</div></div>
        <div class="detail-item detail-full"><div class="detail-label">指令</div><div class="detail-value">${s.commands}</div></div></div>
        ${ings.length?`<h3 style="margin-top:20px">🥘 投料明细</h3><table class="ingredients-table"><thead><tr><th>物料编码</th><th>剂量</th><th>单位</th></tr></thead><tbody>${ings.map(x=>`<tr><td>${x.ingredientsId}</td><td>${x.ingredientsDosage}</td><td>${x.ingredientsUnit}</td></tr>`).join('')}</tbody></table>`:''}`;
    }
    window.onload=function(){render();if(RECIPES.length>0)select(RECIPES[0]);console.log('✅ Loaded '+RECIPES.length+' recipes instantly!');};
  </script>
</body>
</html>
